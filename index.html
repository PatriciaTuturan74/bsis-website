<!DOCTYPE html>
<html>
<head>
    <title>BSIS Website</title>

<style>

body{
    font-family: Arial;
    background: #f0f2f5;
}

.container{
    width: 350px;
    margin: 50px auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
}

input{
    width: 90%;
    padding: 10px;
    margin: 8px;
}

button{
    padding: 10px 20px;
    background: navy;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

img{
    width: 120px;
    height: 120px;
    border-radius: 50%;
}

#loginPage,
#dashboard{
    display: none;
}

</style>
</head>

<body>

<div class="container" id="registerPage">

    <h2>Registration Form</h2>

    <input type="text" id="name" placeholder="Full Name">

    <input type="text" id="course" placeholder="Course">

    <input type="text" id="age" placeholder="Age">

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p>
        Already have account?
        <a href="#" onclick="showLogin()">Login</a>
    </p>

</div>

<div class="container" id="loginPage">

    <h2>Login Form</h2>

    <input type="text" id="loginUser" placeholder="Username">

    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<div class="container" id="dashboard">

    <h2>Student Dashboard</h2>

    <img src="profile.jpg">

    <h3 id="displayName"></h3>

    <p id="displayCourse"></p>

    <p id="displayAge"></p>

    <button onclick="logout()">Logout</button>

</div>

<script>

function showLogin(){

document.getElementById("registerPage").style.display = "none";

document.getElementById("loginPage").style.display = "block";

}

function register(){

let name = document.getElementById("name").value;

let course = document.getElementById("course").value;

let age = document.getElementById("age").value;

let username = document.getElementById("username").value;

let password = document.getElementById("password").value;

localStorage.setItem("name", name);

localStorage.setItem("course", course);

localStorage.setItem("age", age);

localStorage.setItem("username", username);

localStorage.setItem("password", password);

alert("Registration Successful!");

showLogin();

}

function login(){

let loginUser = document.getElementById("loginUser").value;

let loginPass = document.getElementById("loginPass").value;

let storedUser = localStorage.getItem("username");

let storedPass = localStorage.getItem("password");

if(loginUser == storedUser && loginPass == storedPass){

document.getElementById("loginPage").style.display = "none";

document.getElementById("dashboard").style.display = "block";

document.getElementById("displayName").innerHTML =
localStorage.getItem("name");

document.getElementById("displayCourse").innerHTML =
"Course: " + localStorage.getItem("course");

document.getElementById("displayAge").innerHTML =
"Age: " + localStorage.getItem("age");

}

else{

alert("Invalid Username or Password");

}

}

function logout(){

document.getElementById("dashboard").style.display = "none";

document.getElementById("loginPage").style.display = "block";

}

</script>

</body>
</html>
